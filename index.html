<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPC 공정분석 대시보드</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2230;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --accent: #00d4aa;
      --accent2: #f78166;
      --warn: #d29922;
      --ok: #3fb950;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-main: 'IBM Plex Sans KR', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      min-height: 100vh;
    }

    /* Header */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .logo-text {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--accent);
    }
    .status-badge {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid;
    }
    .status-ok { color: var(--ok); border-color: var(--ok); background: rgba(63,185,80,.08); }
    .status-warn { color: var(--warn); border-color: var(--warn); background: rgba(210,153,34,.08); }
    .status-error { color: var(--accent2); border-color: var(--accent2); background: rgba(247,129,102,.08); }

    /* Layout */
    .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }
    .kpi-card:hover { border-color: var(--accent); }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .kpi-card.green::before { background: var(--ok); }
    .kpi-card.teal::before { background: var(--accent); }
    .kpi-card.yellow::before { background: var(--warn); }
    .kpi-card.red::before { background: var(--accent2); }
    .kpi-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .kpi-value {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 600;
      line-height: 1;
    }
    .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

    /* Charts Grid */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    .chart-card-full { grid-column: 1 / -1; }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title i { color: var(--accent); font-size: 12px; }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .ctrl-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font-main);
      cursor: pointer;
    }
    .ctrl-select:focus { outline: none; border-color: var(--accent); }
    .btn-gen {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity .2s;
    }
    .btn-gen:hover { opacity: .85; }
    .btn-export {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .2s;
    }
    .btn-export:hover { border-color: var(--accent); color: var(--accent); }

    /* Alarm Table */
    .alarm-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .alarm-table th {
      text-align: left;
      padding: 8px 12px;
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      font-weight: 400;
    }
    .alarm-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(48,54,61,.5);
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .alarm-table tr:hover td { background: var(--surface2); }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--font-mono);
    }
    .tag-violation { background: rgba(247,129,102,.15); color: var(--accent2); }
    .tag-warning   { background: rgba(210,153,34,.15);  color: var(--warn); }
    .tag-normal    { background: rgba(63,185,80,.12);   color: var(--ok); }

    /* Histogram */
    .hist-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
      .hist-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 500px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-dot"></div>
    <span class="logo-text">SPC MONITOR</span>
  </div>
  <div id="statusBadge" class="status-badge status-ok">● NORMAL</div>
</div>

<div class="main">

  <!-- Controls -->
  <div class="controls">
    <select class="ctrl-select" id="processSelect">
      <option value="A">공정 A — 압출</option>
      <option value="B">공정 B — 사출</option>
      <option value="C">공정 C — 도포</option>
    </select>
    <select class="ctrl-select" id="nSelect">
      <option value="30">샘플 30개</option>
      <option value="50" selected>샘플 50개</option>
      <option value="100">샘플 100개</option>
    </select>
    <button class="btn-gen" onclick="generateAll()">
      <i class="fas fa-sync-alt"></i> 데이터 생성
    </button>
    <button class="btn-export" onclick="exportCSV()">
      <i class="fas fa-download"></i> CSV 내보내기
    </button>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid">
    <div class="kpi-card teal">
      <div class="kpi-label">공정 평균 (X̄)</div>
      <div class="kpi-value" id="kpiMean">—</div>
      <div class="kpi-sub">목표: 50.00</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">Cp (공정능력)</div>
      <div class="kpi-value" id="kpiCp">—</div>
      <div class="kpi-sub">기준: ≥ 1.33</div>
    </div>
    <div class="kpi-card yellow">
      <div class="kpi-label">Cpk (편향 능력)</div>
      <div class="kpi-value" id="kpiCpk">—</div>
      <div class="kpi-sub">기준: ≥ 1.00</div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-label">이상 포인트</div>
      <div class="kpi-value" id="kpiAlarms">—</div>
      <div class="kpi-sub">Nelson 규칙 기준</div>
    </div>
  </div>

  <!-- X-bar Chart + Alarm List -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="card-header">
        <span class="card-title"><i class="fas fa-chart-line"></i> X-bar 관리도</span>
      </div>
      <canvas id="xbarChart" height="120"></canvas>
    </div>
    <div class="chart-card">
      <div class="card-header">
        <span class="card-title"><i class="fas fa-chart-bar"></i> R 관리도</span>
      </div>
      <canvas id="rChart" height="120"></canvas>
    </div>
  </div>

  <!-- Histogram + Capability -->
  <div class="hist-grid">
    <div class="chart-card">
      <div class="card-header">
        <span class="card-title"><i class="fas fa-align-left"></i> 분포 히스토그램</span>
      </div>
      <canvas id="histChart" height="140"></canvas>
    </div>
    <div class="chart-card">
      <div class="card-header">
        <span class="card-title"><i class="fas fa-bullseye"></i> 규격 대비 분포</span>
      </div>
      <canvas id="capChart" height="140"></canvas>
    </div>
  </div>

  <!-- Alarm Table -->
  <div class="chart-card">
    <div class="card-header">
      <span class="card-title"><i class="fas fa-exclamation-triangle"></i> 이상 탐지 로그</span>
    </div>
    <div style="overflow-x:auto;">
      <table class="alarm-table">
        <thead>
          <tr>
            <th>#</th><th>샘플 번호</th><th>측정값</th><th>UCL / LCL</th><th>Nelson 규칙</th><th>상태</th>
          </tr>
        </thead>
        <tbody id="alarmBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ─── 설정 ──────────────────────────────────────────────────────────────────
const SPEC = { USL: 53, LSL: 47, target: 50 };
const SUBGROUP = 5;
const PROCESS_PARAMS = {
  A: { mu: 50.0, sigma: 0.8 },
  B: { mu: 50.3, sigma: 1.1 },
  C: { mu: 49.7, sigma: 0.6 },
};

let charts = {};
let rawData = [];

// ─── 통계 유틸 ──────────────────────────────────────────────────────────────
const randn = () => {
  let u = 0, v = 0;
  while (!u) u = Math.random();
  while (!v) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
};
const mean = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
const range = arr => Math.max(...arr) - Math.min(...arr);
const std = arr => {
  const m = mean(arr);
  return Math.sqrt(arr.reduce((a, b) => a + (b - m) ** 2, 0) / (arr.length - 1));
};

// D3, D4 상수 (서브그룹 크기 2~10)
const D3 = [0, 0, 0, 0, 0, 0, 0.076, 0.136, 0.184, 0.223];
const D4 = [0, 0, 3.267, 2.575, 2.282, 2.115, 2.004, 1.924, 1.864, 1.816];
const A2 = [0, 0, 1.880, 1.023, 0.729, 0.577, 0.483, 0.419, 0.373, 0.337];

// ─── 데이터 생성 ────────────────────────────────────────────────────────────
function generateData() {
  const proc = document.getElementById('processSelect').value;
  const n    = parseInt(document.getElementById('nSelect').value);
  const { mu, sigma } = PROCESS_PARAMS[proc];
  rawData = [];
  for (let i = 0; i < n; i++) {
    // 가끔 이상 원인 주입
    const drift = (i > n * 0.7 && proc === 'B') ? 1.2 : 0;
    rawData.push(parseFloat((mu + drift + randn() * sigma).toFixed(3)));
  }
}

// ─── X-bar & R 계산 ─────────────────────────────────────────────────────────
function calcControlLimits(data) {
  const sg = SUBGROUP;
  const groups = [];
  for (let i = 0; i + sg <= data.length; i += sg)
    groups.push(data.slice(i, i + sg));

  const xbars = groups.map(mean);
  const ranges = groups.map(range);
  const xbarBar = mean(xbars);
  const rBar    = mean(ranges);
  const a2 = A2[sg];
  const d3 = D3[sg];
  const d4 = D4[sg];

  return {
    xbars, ranges, xbarBar, rBar,
    xUCL: xbarBar + a2 * rBar,
    xLCL: xbarBar - a2 * rBar,
    rUCL: d4 * rBar,
    rLCL: d3 * rBar,
  };
}

// ─── Nelson 규칙 탐지 ────────────────────────────────────────────────────────
function nelsonDetect(xbars, xbarBar, sigma1) {
  const alarms = [];
  const UCL = xbarBar + 3 * sigma1;
  const LCL = xbarBar - 3 * sigma1;
  const U1  = xbarBar + sigma1;
  const L1  = xbarBar - sigma1;

  for (let i = 0; i < xbars.length; i++) {
    const v = xbars[i];
    if (v > UCL || v < LCL) {
      alarms.push({ idx: i, value: v, rule: '규칙 1 — 3σ 이탈', type: 'violation' });
      continue;
    }
    // 규칙 2: 연속 9개 평균 한쪽
    if (i >= 8) {
      const seg = xbars.slice(i - 8, i + 1);
      if (seg.every(x => x > xbarBar) || seg.every(x => x < xbarBar))
        alarms.push({ idx: i, value: v, rule: '규칙 2 — 연속 9점 편향', type: 'warning' });
    }
    // 규칙 3: 연속 6개 단조증가/감소
    if (i >= 5) {
      const seg = xbars.slice(i - 5, i + 1);
      const inc = seg.every((x, j) => j === 0 || x > seg[j - 1]);
      const dec = seg.every((x, j) => j === 0 || x < seg[j - 1]);
      if (inc || dec)
        alarms.push({ idx: i, value: v, rule: '규칙 3 — 연속 6점 단조변화', type: 'warning' });
    }
    // 2σ 경고
    if (v > xbarBar + 2 * sigma1 || v < xbarBar - 2 * sigma1)
      alarms.push({ idx: i, value: v, rule: '규칙 4 — 2σ 경고', type: 'warning' });
  }
  return alarms;
}

// ─── KPI 계산 ────────────────────────────────────────────────────────────────
function calcKPI(data) {
  const s = std(data);
  const m = mean(data);
  const Cp  = (SPEC.USL - SPEC.LSL) / (6 * s);
  const Cpu = (SPEC.USL - m) / (3 * s);
  const Cpl = (m - SPEC.LSL) / (3 * s);
  const Cpk = Math.min(Cpu, Cpl);
  return { m, s, Cp, Cpk };
}

// ─── 차트 그리기 ─────────────────────────────────────────────────────────────
const COLORS = {
  accent: '#00d4aa', accent2: '#f78166', warn: '#d29922',
  ok: '#3fb950', muted: '#7d8590', grid: 'rgba(48,54,61,.6)',
};

function makeChart(id, config) {
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id), config);
}

function drawXbar(lim) {
  const labels = lim.xbars.map((_, i) => `G${i + 1}`);
  const pts = lim.xbars.map((v, i) => ({
    x: i, y: v,
    pointBackgroundColor: (v > lim.xUCL || v < lim.xLCL)
      ? COLORS.accent2 : COLORS.accent,
    pointRadius: (v > lim.xUCL || v < lim.xLCL) ? 7 : 4,
  }));

  makeChart('xbarChart', {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'X̄',
          data: lim.xbars,
          borderColor: COLORS.accent,
          backgroundColor: 'rgba(0,212,170,.08)',
          borderWidth: 2,
          tension: 0.3,
          pointBackgroundColor: lim.xbars.map(v =>
            (v > lim.xUCL || v < lim.xLCL) ? COLORS.accent2 : COLORS.accent),
          pointRadius: lim.xbars.map(v =>
            (v > lim.xUCL || v < lim.xLCL) ? 7 : 4),
          fill: true,
        },
        { label: 'UCL', data: Array(labels.length).fill(lim.xUCL),
          borderColor: COLORS.accent2, borderDash: [5,3], borderWidth: 1.5, pointRadius: 0 },
        { label: 'LCL', data: Array(labels.length).fill(lim.xLCL),
          borderColor: COLORS.accent2, borderDash: [5,3], borderWidth: 1.5, pointRadius: 0 },
        { label: 'CL',  data: Array(labels.length).fill(lim.xbarBar),
          borderColor: COLORS.warn,   borderDash: [3,3], borderWidth: 1,   pointRadius: 0 },
      ]
    },
    options: chartOpts('X̄ 값')
  });
}

function drawR(lim) {
  const labels = lim.ranges.map((_, i) => `G${i + 1}`);
  makeChart('rChart', {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'R', data: lim.ranges, borderColor: COLORS.warn,
          backgroundColor: 'rgba(210,153,34,.08)', borderWidth: 2, tension: 0.3,
          pointRadius: 4, fill: true },
        { label: 'UCL', data: Array(labels.length).fill(lim.rUCL),
          borderColor: COLORS.accent2, borderDash: [5,3], borderWidth: 1.5, pointRadius: 0 },
        { label: 'CL',  data: Array(labels.length).fill(lim.rBar),
          borderColor: COLORS.muted,   borderDash: [3,3], borderWidth: 1,   pointRadius: 0 },
      ]
    },
    options: chartOpts('범위 R')
  });
}

function drawHistogram(data) {
  const bins = 12;
  const min = Math.min(...data), max = Math.max(...data);
  const w = (max - min) / bins;
  const counts = Array(bins).fill(0);
  data.forEach(v => {
    let b = Math.floor((v - min) / w);
    if (b >= bins) b = bins - 1;
    counts[b]++;
  });
  const labels = counts.map((_, i) => (min + i * w + w / 2).toFixed(2));
  const colors = labels.map(l => {
    const v = parseFloat(l);
    if (v < SPEC.LSL || v > SPEC.USL) return COLORS.accent2;
    return COLORS.accent;
  });

  makeChart('histChart', {
    type: 'bar',
    data: { labels, datasets: [{ label: '빈도', data: counts,
      backgroundColor: colors, borderColor: 'transparent', borderRadius: 3 }] },
    options: {
      ...chartOpts('빈도'),
      plugins: { legend: { display: false }, tooltip: { callbacks: {
        title: (items) => `구간: ${items[0].label}`,
        label: (item) => `빈도: ${item.raw}회`
      }}},
    }
  });
}

function drawCapability(data, kpi) {
  // 정규분포 커브
  const pts = 80;
  const lo = SPEC.LSL - 2, hi = SPEC.USL + 2;
  const step = (hi - lo) / pts;
  const xs = Array.from({ length: pts }, (_, i) => lo + i * step);
  const ys = xs.map(x =>
    (1 / (kpi.s * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * ((x - kpi.m) / kpi.s) ** 2)
  );

  makeChart('capChart', {
    type: 'line',
    data: {
      labels: xs.map(x => x.toFixed(2)),
      datasets: [
        { label: '정규분포', data: ys, borderColor: COLORS.accent,
          backgroundColor: 'rgba(0,212,170,.12)', fill: true, borderWidth: 2,
          pointRadius: 0, tension: 0.4 },
      ]
    },
    options: {
      ...chartOpts('밀도'),
      plugins: {
        legend: { display: false },
        annotation: {},
        tooltip: { enabled: false },
      },
      scales: {
        x: { ...xScaleOpts(), ticks: { maxTicksLimit: 6 } },
        y: { ...yScaleOpts() }
      }
    }
  });
}

function chartOpts(yLabel) {
  return {
    responsive: true,
    animation: { duration: 400 },
    plugins: {
      legend: {
        labels: { color: COLORS.muted, font: { size: 11 }, boxWidth: 14 }
      }
    },
    scales: { x: xScaleOpts(), y: yScaleOpts(yLabel) }
  };
}
function xScaleOpts() {
  return {
    grid: { color: COLORS.grid },
    ticks: { color: COLORS.muted, font: { size: 11, family: 'IBM Plex Mono' }, maxTicksLimit: 10 }
  };
}
function yScaleOpts(label = '') {
  return {
    grid: { color: COLORS.grid },
    ticks: { color: COLORS.muted, font: { size: 11, family: 'IBM Plex Mono' } },
    title: { display: !!label, text: label, color: COLORS.muted, font: { size: 11 } }
  };
}

// ─── 알람 테이블 ─────────────────────────────────────────────────────────────
function renderAlarms(alarms, lim) {
  const sigma1 = (lim.xUCL - lim.xbarBar) / 3;
  const tbody = document.getElementById('alarmBody');
  if (!alarms.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--ok);padding:20px">
      <i class="fas fa-check-circle"></i>  이상 없음 — 공정이 관리 상태입니다</td></tr>`;
    return;
  }
  tbody.innerHTML = alarms.map((a, i) => `
    <tr>
      <td style="color:var(--text-muted)">${i + 1}</td>
      <td>G${a.idx + 1}</td>
      <td style="color:${a.type === 'violation' ? 'var(--accent2)' : 'var(--warn)'}">${a.value.toFixed(3)}</td>
      <td style="color:var(--text-muted)">${lim.xUCL.toFixed(3)} / ${lim.xLCL.toFixed(3)}</td>
      <td>${a.rule}</td>
      <td><span class="tag tag-${a.type}">${a.type === 'violation' ? '이상' : '경고'}</span></td>
    </tr>`).join('');
}

// ─── 상태 배지 업데이트 ──────────────────────────────────────────────────────
function updateStatus(alarms) {
  const badge = document.getElementById('statusBadge');
  const violations = alarms.filter(a => a.type === 'violation');
  if (violations.length > 0) {
    badge.className = 'status-badge status-error';
    badge.textContent = `● ${violations.length}건 이상 탐지`;
  } else if (alarms.length > 0) {
    badge.className = 'status-badge status-warn';
    badge.textContent = `● ${alarms.length}건 경고`;
  } else {
    badge.className = 'status-badge status-ok';
    badge.textContent = '● NORMAL';
  }
}

// ─── CSV 내보내기 ─────────────────────────────────────────────────────────────
function exportCSV() {
  if (!rawData.length) return alert('먼저 데이터를 생성하세요.');
  const rows = [['번호', '측정값', '규격상한(USL)', '규격하한(LSL)']];
  rawData.forEach((v, i) => rows.push([i + 1, v, SPEC.USL, SPEC.LSL]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `spc_data_${Date.now()}.csv`;
  a.click();
}

// ─── 메인 ────────────────────────────────────────────────────────────────────
function generateAll() {
  generateData();
  const lim  = calcControlLimits(rawData);
  const kpi  = calcKPI(rawData);
  const sigma1 = (lim.xUCL - lim.xbarBar) / 3;
  const alarms = nelsonDetect(lim.xbars, lim.xbarBar, sigma1);

  // KPI
  document.getElementById('kpiMean').textContent = kpi.m.toFixed(3);
  document.getElementById('kpiCp').textContent   = kpi.Cp.toFixed(3);
  document.getElementById('kpiCpk').textContent  = kpi.Cpk.toFixed(3);
  document.getElementById('kpiAlarms').textContent = alarms.length;

  // KPI 색상
  document.querySelector('.kpi-card.green .kpi-value').style.color
    = kpi.Cp  >= 1.33 ? 'var(--ok)' : 'var(--accent2)';
  document.querySelector('.kpi-card.yellow .kpi-value').style.color
    = kpi.Cpk >= 1.00 ? 'var(--ok)' : 'var(--accent2)';
  document.querySelector('.kpi-card.red .kpi-value').style.color
    = alarms.length   === 0 ? 'var(--ok)' : 'var(--accent2)';

  drawXbar(lim);
  drawR(lim);
  drawHistogram(rawData);
  drawCapability(rawData, kpi);
  renderAlarms(alarms, lim);
  updateStatus(alarms);
}

generateAll();
</script>
